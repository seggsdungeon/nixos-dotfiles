# ==============================================================================
# LENOVO P16S G1 HYPRLAND CONFIGURATION (INTEL IRIS XE + NVIDIA PRIME)
# ==============================================================================

# -----------------------------------------------------
# 1. ENVIRONMENT VARIABLES (WAYLAND/INTEL/NVIDIA)
# -----------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Hardware cursor fix to prevent invisible cursor on NVIDIA
env = WLR_NO_HARDWARE_CURSORS,1

# Tell apps to use Wayland natively instead of XWayland (e.g. Electron apps)
env = NIXOS_OZONE_WL,1
env = MOZ_ENABLE_WAYLAND,1

# Force Hyprland to render via the Intel iGPU to save battery
# (card0 is usually Intel, card1 is NVIDIA. Verify with `ls -l /dev/dri/by-path/`)
env = WLR_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1 

# -----------------------------------------------------
# 2. MONITOR & DISPLAY SCALING
# -----------------------------------------------------

source = ~/.config/nwg-displays/active_profile.json

# Fallback if nwg-displays file doesn't exist yet
monitor = eDP-1, preferred, auto, 1.25

# Fix blurry text in XWayland apps when fractional scaling is active
xwayland {
  force_zero_scaling = true
}

# -----------------------------------------------------
# 3. AUTOSTART PROGRAMS
# -----------------------------------------------------
exec-once = waybar               # Status bar
exec-once = nm-applet --indicator # Network manager applet
exec-once = dunst                # Notification daemon
exec-once = ~/.config/hypr/set-wallpaper.sh          # Uncomment to use hyprpaper for wallpapers
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
exec-once = swaync
exec-once = wal -i ~/Pictures/wallpapers/frieren/hut_in_woods.png

# -----------------------------------------------------
# 4. INPUT & LAPTOP KEYBOARD CONFIG
# -----------------------------------------------------
input {
    kb_layout = de               # German layout
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    
    touchpad {
        natural_scroll = true    # Highly recommended for laptops
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# -----------------------------------------------------
# 5. APPEARANCE & ANIMATIONS
# -----------------------------------------------------
general {
    gaps_in = 2.5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    
    shadow {
	enabled = true
	range = 4
	render_power = 3
	color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = true
}

# -----------------------------------------------------
# 6. KEYBINDINGS
# -----------------------------------------------------
$mainMod = SUPER # Use the Windows/Super key for commands

bind = $mainMod, Print,   exec, grim -g "$(slurp)" - | wl-copy          # region -> clipboard

# Standard Apps
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, D, exec, wofi --show drun # App Launcher
bind = $mainMod, W, exec, brave
bind = $mainMod, C, exec, codium
bind = $mainMod, N, exec, swaync-client -t

# Window Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, down, swapwindow, d
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod, T, layoutmsg, togglesplit

# Resize Windows
bind = $mainMod, R, submap, resize   # Enter resize mode

submap = resize

# Repeatable: hold to keep resizing
binde = , left, resizeactive, -20 0
binde = , right, resizeactive,  20 0
binde = , up, resizeactive,  0 -20
binde = , down, resizeactive,  0  20

# Exit resize mode
bind = , Escape, submap, reset
submap = reset


# Workspaces (Switch)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Workspaces (Move Active Window)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Laptop Hardware Keys (Brightness and Volume)
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , Print, exec, wtype -k Menu
bind = $mainMod SHIFT, S, exec, flameshot gui              # Windows-style Snip shortcut


# SwayNC Blur
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window